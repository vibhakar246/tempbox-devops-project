apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempbox
  namespace: tempbox
  labels:
    app: tempbox
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempbox
  template:
    metadata:
      labels:
        app: tempbox
    spec:
      containers:
      - name: tempbox
        image: tempbox:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
