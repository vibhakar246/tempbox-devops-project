services:
  tempbox-api:
    build: .
    container_name: tempbox-app
    ports:
      - "5000:5000"
    environment:
      - DEBUG=true
      - PORT=5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
